<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta content="NIHANTH Enterprise HCM Platform - Advanced Human Capital Management solutions for modern enterprises." name="description"/>
    <meta content="HCM, Human Capital Management, Enterprise Software, HR Platform, NIHANTH" name="keywords"/>
    <meta content="NIHANTH Enterprise" name="author"/>
    <meta content="#0f172a" name="theme-color"/>
    <title>NIHANTH Enterprise | HCM Solutions</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            margin: 0;
        }
        /* Loading spinner for pre-mount state */
        #root:empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
        }
        #root:empty::before {
            content: "NIHANTH COMPANY";
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: #0f172a;
            font-size: 1.25rem;
        }
        #root:empty::after {
            content: "";
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #0284c7;
            border-radius: 50%;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased text-slate-900">
    <div id="root"></div>
    <!-- CRITICAL: Ensure main.jsx is in the src folder -->
    <script src="/src/main.jsx" type="module"></script>
</body>
</html>
